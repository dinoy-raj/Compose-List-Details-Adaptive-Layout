name: Deploy Compose WebApp to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle Cache
        uses: gradle/gradle-build-action@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Web App (WASM + JS fallback)
        run: ./gradlew :webApp:composeCompatibilityBrowserDistribution

      - name: List build output
        run: ls -R webApp/build/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webApp/build/dist/composeWebCompatibility/productionExecutable

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4